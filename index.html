<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MR.SmartUSEME Premium UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-body min-h-screen">
  <header class="border-b border-white/10 bg-zinc-950/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div>
        <h1 class="font-display text-3xl font-bold tracking-tight text-emerald-400">MR.SmartUSEME</h1>
        <p class="text-sm text-zinc-400">AI Waste Intelligence Dashboard</p>
      </div>
      <button id="theme-toggle" class="px-4 py-2 rounded-xl border border-white/10 hover:bg-white/5 transition">Theme</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">
    <section class="grid lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 rounded-3xl overflow-hidden border border-white/10 bg-gradient-to-br from-zinc-900 to-black shadow-2xl">
        <div class="p-6 flex justify-between items-center border-b border-white/10">
          <div>
            <h2 class="font-display text-2xl">Live Detection Feed</h2>
            <p id="cam-info" class="text-zinc-400 text-sm">Camera idle • CAM-01</p>
          </div>
          <div class="flex gap-3">
            <button onclick="startDetection()" class="px-4 py-2 rounded-xl bg-emerald-500 text-black font-semibold hover:scale-105 transition">Start</button>
            <button onclick="stopCamera()" class="px-4 py-2 rounded-xl bg-rose-500 text-white font-semibold hover:scale-105 transition">Stop</button>
          </div>
        </div>
        <div class="relative aspect-video bg-black">
          <video id="live-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
          <div id="detection-box" class="hidden absolute border-4 border-emerald-400 rounded-2xl"></div>
          <div class="absolute top-4 left-4 px-4 py-2 rounded-full bg-black/60 backdrop-blur border border-white/10">
            <span id="detection-label" class="text-sm font-semibold">Awaiting Detection</span>
          </div>
        </div>
      </div>

      <div class="space-y-6">
        <div class="rounded-3xl border border-emerald-400/20 bg-white/5 backdrop-blur p-6 hover:-translate-y-1 transition-all duration-300">
          <p class="text-zinc-400 text-sm">Current Detection</p>
          <h3 id="det-item-name" class="font-display text-3xl mt-2 text-emerald-400">Idle</h3>
          <p id="det-item-type" class="text-zinc-400 mt-1">Waiting</p>
          <div class="mt-4 h-2 rounded-full bg-zinc-800 overflow-hidden">
            <div id="det-conf-bar" class="h-full bg-emerald-400" style="width:0%"></div>
          </div>
          <p id="det-conf-text" class="mt-2 text-sm text-emerald-400">0%</p>
          <p class="mt-4 text-sm">Status: <span id="det-status">Idle</span></p>
          <p class="text-sm">Action: <span id="det-action">Monitor</span></p>
        </div>

        <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
          <h3 class="font-display text-xl">Detection History</h3>
          <div id="detection-history" class="mt-4 space-y-3 max-h-80 overflow-y-auto">
            <p class="text-zinc-500">Detections will appear here...</p>
          </div>
        </div>
      </div>
    </section>

    <section class="grid md:grid-cols-2 gap-6">
      <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
        <h3 class="font-display text-xl mb-4">Category Analytics</h3>
        <canvas id="pieChart"></canvas>
      </div>
      <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
        <h3 class="font-display text-xl mb-4">Top Waste Types</h3>
        <canvas id="barChart"></canvas>
      </div>
    </section>

    <section class="rounded-3xl border border-white/10 bg-white/5 p-6">
      <h3 class="font-display text-xl mb-4">GPS Smart Bin Map</h3>
      <div id="map" class="h-96 rounded-2xl bg-zinc-900"></div>
    </section>
  </main>
  <script>
    function toggleTheme() {
      const body = document.body;
      body.classList.toggle('bg-zinc-950');
      body.classList.toggle('text-zinc-100');
      body.classList.toggle('bg-white');
      body.classList.toggle('text-zinc-900');
    }

    // expose existing detection controls from detection.js
    window.startDetection = window.startDetection || function () {
      if (typeof startDetection === 'function') startDetection();
    };

    window.stopCamera = window.stopCamera || function () {
      if (typeof stopCamera === 'function') stopCamera();
    };

    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
  </script>

  <!-- keep your existing project scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="gps.js"></script>
  <script src="detection.js"></script>
</body>
</html>
